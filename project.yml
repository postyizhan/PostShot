name: PostShot

options:
  bundleIdPrefix: com.postshot
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    # Signing is intentionally disabled — SideStore signs on-device.
    # CI never touches Apple certificates / private keys / provisioning profiles.
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGN_IDENTITY: ""
    DEVELOPMENT_TEAM: ""
    TARGETED_DEVICE_FAMILY: "1,2"
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  PostShot:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Shared
    dependencies:
      - target: PostShotBroadcast
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.postshot.app
        INFOPLIST_FILE: Sources/Info.plist
        # Portrait only (SPEC §4).
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
        # App Group declaration (re-introduced to test container availability under free signing).
        # Signing stays disabled in CI; SideStore applies entitlements on-device at install.
        CODE_SIGN_ENTITLEMENTS: Sources/PostShot.entitlements

  PostShotBroadcast:
    type: app-extension
    platform: iOS
    sources:
      - path: BroadcastExtension
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.postshot.app.broadcast
        INFOPLIST_FILE: BroadcastExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: BroadcastExtension/PostShotBroadcast.entitlements

  PostShotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: PostShot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.postshot.app.tests
        GENERATE_INFOPLIST_FILE: "YES"
