name: Build Unsigned IPA

# 构建未签名 .ipa 并作为 artifact 上传(SPEC §5)。
# CI 绝不接触任何苹果证书 / 私钥 / 描述文件 —— 签名交给设备端的 SideStore。

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build IPA (unsigned)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # macos-14 runner 预装了多个 Xcode。这里固定一个支持 iOS 16 SDK 的稳定版本。
      # Xcode_16.app 在 macos-14 镜像上可用;若首次 CI 报路径不存在,
      # 可改成 Xcode_15.4.app,或直接删掉此步骤使用默认 Xcode。
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # 主要必过步骤:为通用 iOS 设备构建 Release,完全禁用签名。
      - name: Build for generic iOS device (signing disabled)
        run: |
          xcodebuild \
            -project LongShot.xcodeproj \
            -scheme LongShot \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      # 把未签名的 .app 打包成 .ipa:Payload/ 目录 + zip。
      - name: Package unsigned .ipa
        run: |
          mkdir -p Payload
          cp -R "build/Build/Products/Release-iphoneos/LongShot.app" "Payload/"
          zip -r LongShot.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LongShot-ipa
          path: LongShot.ipa

  test:
    name: Unit Tests (best-effort)
    runs-on: macos-14
    # SPEC §2 / §9 重视 OverlapDetector 偏移检测的算法单测。
    # 标记为非阻断:模拟器命名在不同镜像上可能变化,不应拖垮主构建产物。
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # iPhone 15 模拟器名称取决于 runner 已安装的 simruntime。
      # 若该名称不存在,请改用 'iPhone 16' 或镜像上实际可用的设备名。
      - name: Run unit tests on simulator
        run: |
          xcodebuild test \
            -project LongShot.xcodeproj \
            -scheme LongShot \
            -destination 'platform=iOS Simulator,name=iPhone 15'
