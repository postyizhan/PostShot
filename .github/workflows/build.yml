name: Build Unsigned IPA

# 构建未签名 .ipa 并作为 artifact 上传(SPEC §5)。
# CI 绝不接触任何苹果证书 / 私钥 / 描述文件 —— 签名交给设备端的 SideStore。
#
# 关于版本:部署目标是 iOS 16(见 project.yml,App 能跑的最低系统,保持低 = 最大兼容)。
# 构建工具链则用当前最新:macos-26 runner + 默认 Xcode(26.x)+ iOS 26 SDK。
# 用新 SDK 构建低部署目标的 App 是标准做法,产物在 iOS 16 到最新系统上都能装。

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build IPA (unsigned)
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # 主要必过步骤:为通用 iOS 设备构建 Release,完全禁用签名。
      # 使用 runner 默认 Xcode(macos-26 当前默认 26.4.1),不固定具体版本路径,
      # 避免镜像更新后写死的路径失效。
      - name: Build for generic iOS device (signing disabled)
        run: |
          xcodebuild \
            -project LongShot.xcodeproj \
            -scheme LongShot \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      # 把未签名的 .app 打包成 .ipa:Payload/ 目录 + zip。
      - name: Package unsigned .ipa
        run: |
          mkdir -p Payload
          cp -R "build/Build/Products/Release-iphoneos/LongShot.app" "Payload/"
          zip -r LongShot.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LongShot-ipa
          path: LongShot.ipa

  test:
    name: Unit Tests
    runs-on: macos-26
    # SPEC §2 / §9 重视 OverlapDetector 偏移检测的算法单测。
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # 动态挑选一台已安装的 iPhone 模拟器,避免写死设备名在镜像更新后失效。
      # 当前 macos-26 镜像装的是 iPhone 17 系列(iOS 26.x 运行时)。
      - name: Run unit tests on simulator
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -oE 'iPhone 1[0-9][^(]*' | head -1 | xargs)
          echo "使用模拟器: ${DEVICE:-iPhone 17}"
          xcodebuild test \
            -project LongShot.xcodeproj \
            -scheme LongShot \
            -destination "platform=iOS Simulator,name=${DEVICE:-iPhone 17}"
